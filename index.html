<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IKEMOTO CO.,LTD</title>
<meta name="apple-mobile-web-app-title" content="IKEMOTO CO.,LTD">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="application-name" content="IKEMOTO CO.,LTD">
<style>
  :root{
    --navy:#1f3a6d;        /* メイン紺 */
    --navy-deep:#152a52;   /* 濃紺（押下・ヘッダー） */
    --navy-soft:#eaf1fb;   /* 淡い青（選択背景など） */
    --accent:#ff6a13;      /* オレンジ（操作の主役） */
    --accent-deep:#e85d05; /* オレンジ押下 */
    --accent-soft:#fff1e7; /* 淡いオレンジ */
    --ink:#16243a;
    --sub:#647089;
    --line:#d8e2f0;
    --bg:#f3f7fc;          /* 爽やかなブルーグレーの地 */
    --white:#ffffff;
    --warn-bg:#fff4e5;
    --warn-line:#f0b860;
    --warn-ink:#8a5a10;
    --ok:#1f9d63;
    --danger:#d0492f;
    --radius:12px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Barlow","Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);font-size:16px;line-height:1.5;
    padding-bottom:120px;
  }
  header{
    background:linear-gradient(120deg,var(--navy-deep),var(--navy));color:#fff;padding:14px 16px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:40;border-bottom:3px solid var(--accent);
  }
  header .title{font-weight:600;letter-spacing:.04em;font-size:17px}
  header .title small{display:block;font-weight:400;font-size:11px;opacity:.85;letter-spacing:.08em}
  header button{
    background:rgba(255,255,255,.16);color:#fff;border:0;border-radius:9px;
    width:40px;height:40px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-family:inherit;
  }
  header button:active{background:rgba(255,255,255,.28)}
  .wrap{max-width:680px;margin:0 auto;padding:16px}
  .day-head{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    padding:8px 14px;margin-bottom:14px;border-left:4px solid var(--navy);
    display:flex;align-items:center;gap:10px;
  }
  .day-head label{font-size:12px;color:var(--sub);margin:0;flex:0 0 auto}
  .day-head .date-field{flex:1;min-width:0}
  .day-head .date-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .day-head input[type="date"]{
    width:auto;flex:0 0 auto;font-size:14px;padding:6px 10px;font-weight:600;
  }
  .date-wareki{font-size:15px;font-weight:700;color:var(--navy);letter-spacing:.03em}
  .date-wareki.holiday{color:var(--danger)}
  input,select,textarea{
    width:100%;font-family:inherit;font-size:16px;color:var(--ink);
    border:1px solid var(--line);border-radius:9px;padding:11px 12px;background:#fff;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--navy);outline-offset:-1px;border-color:var(--navy)}
  textarea{resize:none;overflow:hidden;min-height:44px}

  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{flex:1;border:0;background:#fff;padding:11px 0;font-size:14px;font-family:inherit;cursor:pointer;color:var(--sub)}
  .seg button.active{background:var(--navy);color:#fff;font-weight:600}
  .seg button.seg-casual.active{background:#1f6b4a;color:#fff}

  .card{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 14px 14px 16px;margin-bottom:12px;position:relative;overflow:hidden;
    box-shadow:0 1px 3px rgba(21,42,82,.05);
  }
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--navy)}
  .card .row{margin-bottom:10px}
  .card .row:last-child{margin-bottom:0}
  .card label{font-size:12px;color:var(--sub);display:block;margin-bottom:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .card .del{
    position:absolute;top:10px;right:10px;background:none;border:0;color:var(--danger);
    font-size:13px;cursor:pointer;padding:4px 6px;
  }
  .card .idx{
    display:inline-flex;align-items:baseline;gap:4px;color:#fff;background:var(--accent);
    font-weight:800;margin-bottom:14px;letter-spacing:.02em;padding:5px 16px;border-radius:24px;
    box-shadow:0 2px 8px rgba(255,106,19,.30);
  }
  .card .idx .idx-label{font-size:13px;font-weight:700;opacity:.95}
  .card .idx .idx-num{font-size:22px;font-weight:800;line-height:1}
  .carry{
    display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:12px;padding:9px 11px;
    background:var(--navy-soft);border-radius:9px;font-size:13px;color:var(--navy);
  }
  .carry-name{font-weight:700}
  .carry-sep{color:var(--sub)}
  .carry-site{color:var(--ink)}
  .carry-tag{margin-left:auto;font-size:10px;font-weight:700;color:#fff;background:var(--navy);padding:2px 8px;border-radius:20px;letter-spacing:.04em}

  /* autocomplete */
  .ac{position:relative}
  .ac-list{
    position:absolute;left:0;right:0;top:calc(100% + 2px);z-index:30;background:#fff;
    border:1px solid var(--line);border-radius:9px;box-shadow:0 8px 24px rgba(28,34,48,.12);
    max-height:210px;overflow:auto;display:none;
  }
  .ac-list.open{display:block}
  .ac-item{padding:11px 12px;font-size:15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .ac-item:active,.ac-item.hl{background:var(--navy-soft)}
  .ac-item .x{color:var(--sub);font-size:12px;padding:2px 6px;border:1px solid var(--line);border-radius:6px}

  .num-field .stepper{display:flex;align-items:stretch;gap:0}
  .num-field .stepper button{
    width:46px;border:1px solid var(--line);background:#fff;font-size:22px;color:var(--navy);cursor:pointer;
  }
  .num-field .stepper button:first-child{border-radius:9px 0 0 9px}
  .num-field .stepper button:last-child{border-radius:0 9px 9px 0}
  .num-field .stepper input{text-align:center;border-radius:0;border-left:0;border-right:0;-moz-appearance:textfield}
  .num-field .stepper input::-webkit-outer-spin-button,
  .num-field .stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

  /* 人工数プルダウン */
  select.ninku-sel{
    font-size:16px;padding:11px 12px;background:#fff;border:1px solid var(--line);border-radius:9px;
    font-variant-numeric:tabular-nums;
  }
  /* 人工数・残業の視覚的区別 */
  .time-row{align-items:stretch}
  .time-field{padding:10px;border-radius:10px;border:1.5px solid transparent}
  .time-field label{display:flex;align-items:center;gap:6px}
  .time-badge{display:inline-block;font-size:10px;font-weight:700;color:#fff;padding:2px 7px;border-radius:20px;letter-spacing:.04em}
  /* 人工数＝主役（紺） */
  .ninku-field{background:var(--navy-soft);border-color:#cdddf3}
  .ninku-badge{background:var(--navy)}
  .ninku-field select.ninku-sel{border:1.5px solid var(--navy);font-weight:700;color:var(--navy)}
  /* 残業＝補助（オレンジ・控えめ） */
  .ot-field{background:var(--accent-soft);border-color:#fad9c2}
  .ot-badge{background:var(--accent)}
  .ot-field .stepper input{font-weight:600}
  .ot-field .stepper button{color:var(--accent-deep)}
  /* 作業内容 自動伸長textarea */
  textarea.ac-multi{
    width:100%;font-family:inherit;font-size:16px;line-height:1.6;color:var(--ink);
    border:1px solid var(--line);border-radius:9px;padding:12px;background:#fff;
    resize:none;overflow:hidden;min-height:48px;
  }
  textarea.ac-multi:focus{outline:2px solid var(--navy);outline-offset:-1px;border-color:var(--navy)}
  textarea.comment-area{
    width:100%;font-family:inherit;font-size:16px;line-height:1.6;color:var(--ink);
    border:1px solid var(--line);border-radius:9px;padding:12px;background:#fcfdff;
    resize:none;overflow:hidden;min-height:48px;
  }
  textarea.comment-area:focus{outline:2px solid var(--navy);outline-offset:-1px;border-color:var(--navy)}

  .add-btn{
    width:100%;border:1.5px dashed var(--accent);color:var(--accent-deep);background:var(--accent-soft);
    border-radius:var(--radius);padding:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;
    margin-bottom:14px;
  }
  .add-btn:active{background:#ffe3d1}
  .add-btn.sub{border:0;color:#fff;background:var(--navy);font-weight:700;box-shadow:0 3px 10px rgba(21,42,82,.18)}
  .add-btn.sub:active{background:var(--navy-deep)}

  .summary{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:14px;border-top:3px solid var(--navy);
  }
  .summary h3{margin:0 0 10px;font-size:13px;color:var(--navy);font-weight:700;letter-spacing:.04em;
    padding-left:10px;border-left:3px solid var(--accent);}
  .sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--line);font-size:15px}
  .sum-row:first-of-type{border-top:0}
  .sum-row .who{font-weight:600}
  .sum-row .tag{font-size:11px;color:var(--sub);margin-left:6px;font-weight:400}
  .sum-row .val{font-variant-numeric:tabular-nums}
  .sum-row.ng .val{color:var(--danger);font-weight:600}
  .sum-row.ok .val{color:var(--ok);font-weight:600}
  .sum-row .ot{color:var(--sub);font-size:13px;margin-left:8px}

  .footer-bar{
    position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));z-index:35;
  }
  .footer-bar .inner{max-width:680px;margin:0 auto;display:flex;gap:10px;align-items:center}
  .send-btn{
    flex:1;background:var(--accent);color:#fff;border:0;border-radius:var(--radius);
    padding:15px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;
    box-shadow:0 4px 14px rgba(255,106,19,.30);letter-spacing:.02em;
  }
  .send-btn:active{background:var(--accent-deep)}
  .send-btn:disabled{opacity:.5}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,26,40,.5);z-index:60;display:none;align-items:flex-end;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{
    background:#fff;width:100%;max-width:680px;border-radius:16px 16px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));
    max-height:88vh;overflow:auto;
  }
  .modal.center{border-radius:16px;margin:auto;max-width:440px}
  .modal h2{font-size:16px;margin:0 0 14px;display:flex;justify-content:space-between;align-items:center}
  .modal h2 .close{background:none;border:0;font-size:22px;color:var(--sub);cursor:pointer}
  .modal .warn-box{background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn-ink);border-radius:10px;padding:12px;margin-bottom:14px;font-size:14px}
  .modal .warn-box ul{margin:8px 0 0;padding-left:18px}
  .modal-actions{display:flex;gap:10px;margin-top:8px}
  .modal-actions button{flex:1;border-radius:10px;padding:13px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;border:0}
  .btn-ghost{background:#fff;border:1px solid var(--line)!important;color:var(--ink)}
  #confirmModal.error-only #confirmSend{display:none}
  .btn-primary{background:var(--accent);color:#fff}

  /* settings */
  .set-section{margin-bottom:22px}
  .set-section h3{font-size:14px;margin:0 0 8px;color:var(--navy);font-weight:700;
    padding-left:9px;border-left:3px solid var(--accent);}
  .chip-list{display:flex;flex-direction:column;gap:8px}
  .chip{display:flex;align-items:center;gap:8px;background:var(--navy-soft);border-radius:9px;padding:8px 10px}
  .chip input{background:#fff}
  .chip button{background:none;border:0;color:var(--danger);font-size:13px;cursor:pointer;white-space:nowrap;padding:6px}
  .chip .handle{color:var(--sub);font-size:18px;cursor:grab;line-height:1}
  .add-line{display:flex;gap:8px;margin-top:8px}
  .add-line button{background:var(--accent);color:#fff;border:0;border-radius:9px;padding:0 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
  .hist-cat{margin-bottom:6px}
  .hist-cat summary{cursor:pointer;padding:10px 12px;background:var(--navy-soft);border-radius:9px;font-size:14px;font-weight:600;list-style:none;display:flex;justify-content:space-between}
  .hist-cat summary::-webkit-details-marker{display:none}
  .hist-cat[open] summary{border-radius:9px 9px 0 0}
  .hist-body{border:1px solid var(--line);border-top:0;border-radius:0 0 9px 9px;padding:8px}
  .hist-item{display:flex;gap:8px;align-items:center;padding:4px 0}
  .hist-item input{font-size:14px;padding:8px 10px}
  .hist-item button{background:none;border:0;color:var(--danger);font-size:12px;cursor:pointer;padding:6px}
  .empty{color:var(--sub);font-size:13px;padding:8px 4px}
  .toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:12px 18px;border-radius:24px;font-size:14px;z-index:80;opacity:0;transition:opacity .25s;pointer-events:none;
  }
  .toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="title">作業日報入力<small>株式会社イケモト</small></div>
  <button id="openSettings" aria-label="設定">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </button>
</header>

<div class="wrap">
  <div class="day-head">
    <label for="workDate">作業日</label>
    <div class="date-field">
      <div class="date-row">
        <input type="date" id="workDate">
        <span class="date-wareki" id="dateWareki"></span>
      </div>
    </div>
  </div>

  <div id="rows"></div>

  <button class="add-btn" id="addWorkRow">＋ 作業内容を追加（取引先・現場はそのまま）</button>
  <button class="add-btn sub" id="addRow">＋ 現場又は職人を追加（次の現場、別の職人）</button>

  <div class="summary" id="summary" style="display:none">
    <h3>本日の人工数チェック（7時間＝1人工／合計は7の倍数）</h3>
    <div id="sumBody"></div>
  </div>
</div>

<div class="footer-bar">
  <div class="inner">
    <button class="send-btn" id="sendBtn">日報を送信</button>
  </div>
</div>

<!-- 確認モーダル -->
<div class="modal-bg" id="confirmModal">
  <div class="modal center">
    <h2>送信前の確認<button class="close" data-close>×</button></h2>
    <div id="confirmBody"></div>
    <div class="modal-actions">
      <button class="btn-ghost" data-close>戻って修正</button>
      <button class="btn-primary" id="confirmSend">このまま送信</button>
    </div>
  </div>
</div>

<!-- 設定モーダル -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h2>設定<button class="close" data-close>×</button></h2>

    <div class="set-section">
      <h3>入力者（この端末の使用者）</h3>
      <div style="font-size:12px;color:var(--sub);margin-bottom:8px">送信するデータすべてに、ここで設定した名前が「入力者」として自動で記録されます。各自のスマホで一度だけ設定してください。</div>
      <input type="text" id="operatorInput" placeholder="例）池本 太郎">
    </div>

    <div class="set-section">
      <h3>社員（プルダウン用）</h3>
      <div class="chip-list" id="staffList"></div>
      <div class="add-line">
        <input type="text" id="newStaff" placeholder="社員名を追加">
        <button id="addStaff">追加</button>
      </div>
    </div>

    <div class="set-section">
      <h3>履歴の編集・削除</h3>
      <div id="histArea"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   データ保存（動作確認用：localStorage）
   ※ 後段で会社の共有スプレッドシート(GAS)送信に差し替え
   ============================================================ */
const LS_KEY = "demen_ikemoto_v1";
const defaultData = {
  operator: "",        // この端末の使用者（入力者）
  staff: ["吉岡 和広", "宮本 真司", "中村 誠", "高倉 司"], // 初期登録の社員
  history: {
    client: ["要建設","かねわ工務店","下岡建設","創翔","太平工業","藤木工務店","水野建設"], // 取引先名（初期登録）
    site: [],        // 現場名
    casual: [],      // 日雇職人名（社員とは別管理）
    work1: ["外部、⚫️面、⚫️階〜⚫️階","内部、⚫️階〜⚫️階"], // 作業内容：内外・面/階（初期登録）
    work2: ["外壁","軒天","破風、鼻隠し","バルコニー 天井","バルコニー 手摺壁","廊下 天井","廊下 壁","天井(モルタル面)","天井(ケイカル面)","天井(PB面)","壁(モルタル面)","壁(ケイカル面)","壁(PB面)","各室玄関扉","PS､MB扉","鋼製建具","木製建具","額縁､木枠","巾木","竪とい､軒とい","屋根","下屋","庇"], // 作業内容：部位（初期登録）
    work3: ["目地紗､パテ､研磨作業","養生","シーラー塗布(又は下塗り)","EP(-G)､中塗･上塗","UE､中塗･上塗","SOP､中塗･上塗り","リシン吹付","タイルベース吹付","グロス､中塗･上塗","養生バラシ"]        // 作業内容：何をした
  }
};
let store = loadStore();
function loadStore(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return JSON.parse(JSON.stringify(defaultData));
    const d = JSON.parse(raw);
    d.operator = d.operator || "";
    d.staff = (Array.isArray(d.staff) && d.staff.filter(s=>(s||"").trim()).length>0)
      ? d.staff
      : defaultData.staff.slice();   // 未登録なら初期4名を入れる
    d.history = Object.assign({client:[],site:[],casual:[],work1:[],work2:[],work3:[]}, d.history||{});
    // 取引先名が未登録なら初期値を入れる
    if(!(Array.isArray(d.history.client) && d.history.client.filter(s=>(s||"").trim()).length>0)){
      d.history.client = defaultData.history.client.slice();
    }
    // 作業内容①が未登録なら初期値を入れる
    if(!(Array.isArray(d.history.work1) && d.history.work1.filter(s=>(s||"").trim()).length>0)){
      d.history.work1 = defaultData.history.work1.slice();
    }
    // 作業内容②が未登録なら初期値を入れる
    if(!(Array.isArray(d.history.work2) && d.history.work2.filter(s=>(s||"").trim()).length>0)){
      d.history.work2 = defaultData.history.work2.slice();
    }
    // 作業内容③が未登録なら初期値を入れる
    if(!(Array.isArray(d.history.work3) && d.history.work3.filter(s=>(s||"").trim()).length>0)){
      d.history.work3 = defaultData.history.work3.slice();
    }
    return d;
  }catch(e){ return JSON.parse(JSON.stringify(defaultData)); }
}
function saveStore(){ localStorage.setItem(LS_KEY, JSON.stringify(store)); }

/* 履歴へ追加（重複なし・先頭に） */
function pushHistory(cat, val){
  val = (val||"").trim();
  if(!val) return;
  const arr = store.history[cat];
  const i = arr.indexOf(val);
  if(i>-1) arr.splice(i,1);
  arr.unshift(val);
  if(arr.length>200) arr.pop();
}

/* ============================================================
   行（出面1件）の管理
   ============================================================ */
let rows = [];        // {id, kind:'staff'|'casual', name, client, site, w1,w2,w3, ninku, ot}
let rid = 1;
const HISTORY_LABELS = {
  client:"取引先名", site:"現場名", casual:"外注職人名",
  work1:"作業内容：内外・面/階", work2:"作業内容：部位", work3:"作業内容：何をした"
};

function newRow(copyFrom){
  const base = {id:rid++, kind:"staff", name:"", client:"", site:"", w1:"", w2:"", w3:"", comment:"", ninku:0, ot:0};
  if(copyFrom){ // 労働時間・コメント以外（区分・職人名・取引先・現場・作業内容3階層）を引き継ぐ
    base.kind = copyFrom.kind;
    base.name = copyFrom.name;
    base.client = copyFrom.client;
    base.site = copyFrom.site;
    base.w1 = copyFrom.w1;
    base.w2 = copyFrom.w2;
    base.w3 = copyFrom.w3;
    // ninku / ot / comment は引き継がない
  }
  return base;
}

function addRow(){
  const last = rows[rows.length-1];
  rows.push(newRow(last));
  renderRows();
}

// 取引先・現場・職人名はそのまま（非表示で引き継ぎ）、作業内容3階層・コメント・人工・残業を空にして追加
function addWorkRow(){
  const last = rows[rows.length-1];
  const r = newRow(last);
  r.w1 = ""; r.w2 = ""; r.w3 = ""; r.comment = "";
  r.ninku = 0; r.ot = 0;
  r.workOnly = true;   // 職人名・取引先・現場の入力欄を非表示にする
  rows.push(r);
  renderRows();
}

function delRow(id){
  rows = rows.filter(r=>r.id!==id);
  if(rows.length===0) rows.push(newRow());
  renderRows();
}

/* ============================================================
   行の描画
   ============================================================ */
const rowsEl = document.getElementById("rows");

function renderRows(){

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `

      ${rows.length>1?`<button class="del" data-del="${r.id}">削除</button>`:""}
      ${r.workOnly ? `
      <div class="carry">
        <span class="carry-name">${esc(r.name)||'（職人名 未設定）'}</span>
        <span class="carry-sep">／</span>
        <span class="carry-site">${esc(r.client)||'—'}・${esc(r.site)||'—'}</span>
        <span class="carry-tag">作業内容の追加</span>
      </div>
      ` : `
      <div class="row">
        <div class="seg" data-seg="${r.id}">
          <button data-kind="staff" class="${r.kind==='staff'?'active':''}">社員</button>
          <button data-kind="casual" class="seg-casual ${r.kind==='casual'?'active':''}">外注</button>
        </div>
      </div>
      <div class="row">
        <label>職人名</label>
        <div data-name="${r.id}"></div>
      </div>
      <div class="row grid2">
        <div>
          <label>取引先名</label>
          <div data-ac="client" data-rid="${r.id}"></div>
        </div>
        <div>
          <label>現場名</label>
          <div data-ac="site" data-rid="${r.id}"></div>
        </div>
      </div>
      `}
      <div class="row">
        <label>作業内容 ①内外・面/階</label>
        <div data-ac="work1" data-rid="${r.id}"></div>
      </div>
      <div class="row">
        <label>作業内容 ②部位</label>
        <div data-ac="work2" data-rid="${r.id}"></div>
      </div>
      <div class="row">
        <label>作業内容 ③何をした</label>
        <div data-ac="work3" data-rid="${r.id}"></div>
      </div>
      <div class="row">
        <label>コメント</label>
        <textarea class="comment-area" data-comment="${r.id}" rows="1" placeholder="補足があれば記入">${esc(r.comment||"")}</textarea>
      </div>
      <div class="row grid2 time-row">
        <div class="time-field ninku-field">
          <label><span class="time-badge ninku-badge">人工</span>人工数（7h＝1人工）</label>
          <select class="ninku-sel" data-ninku="${r.id}"></select>
        </div>
        <div class="time-field ot-field num-field">
          <label><span class="time-badge ot-badge">残業</span>残業時間（7hに含まない）</label>
          <div class="stepper" data-num="ot" data-rid="${r.id}">
            <button data-step="-0.5">−</button>
            <input type="number" inputmode="decimal" step="0.5" min="0" value="${r.ot}">
            <button data-step="0.5">＋</button>
          </div>
        </div>

    `;
    rowsEl.appendChild(card);

    // 職人名フィールド（workOnly行には無い）
    const nameHost = card.querySelector(`[data-name="${r.id}"]`);

      if(r.kind==="staff"){

        nameHost.querySelector("select").addEventListener("change", e=>{ r.name=e.target.value; updateSummary(); });
      }else{
        mountAutocomplete(nameHost, "casual", r, "name");
      }
    }

    // 作業内容・取引先・現場のオートコンプリート
    card.querySelectorAll("[data-ac]").forEach(host=>{
      const cat = host.getAttribute("data-ac");
      const field = ({client:"client",site:"site",work1:"w1",work2:"w2",work3:"w3"})[cat];
      const multiline = (cat==="work1"||cat==="work2"||cat==="work3");
      mountAutocomplete(host, cat, r, field, placeholderFor(cat), multiline);
    });

    // コメント（自動伸長）
    const commentArea = card.querySelector(`[data-comment="${r.id}"]`);
    if(commentArea){
      const grow = ()=>{ commentArea.style.height="auto"; commentArea.style.height=commentArea.scrollHeight+"px"; };
      requestAnimationFrame(grow);

    }

    // seg（workOnly行には無い）
    const segEl = card.querySelector(`[data-seg="${r.id}"]`);
    if(segEl){
      segEl.addEventListener("click", e=>{
        const b = e.target.closest("[data-kind]"); if(!b) return;

    }

    // 人工数プルダウン（0.5〜7.0h・0.5刻み）
    const ninkuSel = card.querySelector(`[data-ninku="${r.id}"]`);
    let opts = '<option value="0">—</option>';
    for(let v=0.5; v<=35.0+1e-9; v+=0.5){
      v = Math.round(v*2)/2;
      const sel = Math.abs((Number(r.ninku)||0)-v)<1e-9 ? "selected":"";
      opts += `<option value="${v}" ${sel}>${v} h</option>`;
    }
    ninkuSel.innerHTML = opts;
    ninkuSel.addEventListener("change", ()=>{ r.ninku = parseFloat(ninkuSel.value)||0; updateSummary(); });

    // 残業ステッパー
    card.querySelectorAll("[data-num]").forEach(st=>{
      const field = st.getAttribute("data-num");
      const input = st.querySelector("input");
      st.querySelectorAll("[data-step]").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          let v = parseFloat(input.value||"0") + parseFloat(btn.getAttribute("data-step"));
          if(v<0) v=0;
          v = Math.round(v*2)/2;
          input.value = v; r[field]=v; updateSummary();
        });
      });
      input.addEventListener("input", ()=>{
        let v = parseFloat(input.value||"0"); if(isNaN(v)||v<0) v=0;
        r[field]=v; updateSummary();
      });
    });

    // 削除
    const delBtn = card.querySelector("[data-del]");
    if(delBtn) delBtn.addEventListener("click", ()=> delRow(r.id));
  });
  updateSummary();
}

function placeholderFor(cat){
  return ({work1:"内外・面/階",work2:"部位",work3:"何をした",client:"取引先",site:"現場"})[cat]||"";
}

function buildStaffSelect(r){
  const opts = ['<option value="">選択してください</option>']
    .concat(store.staff.filter(s=>(s||"").trim()).map(s=>`<option value="${esc(s)}" ${r.name===s?"selected":""}>${esc(s)}</option>`));
  return `<select>${opts.join("")}</select>`;
}

/* ============================================================
   オートコンプリート部品
   ============================================================ */
function mountAutocomplete(host, cat, rowObj, field, placeholder, multiline){
  if(multiline){
    host.innerHTML = `
      <div class="ac">
        <textarea class="ac-multi" autocomplete="off" rows="1" placeholder="${placeholder||""}">${esc(rowObj[field]||"")}</textarea>
        <div class="ac-list"></div>
      </div>`;
  }else{
    host.innerHTML = `
      <div class="ac">
        <input type="text" autocomplete="off" placeholder="${placeholder||""}" value="${esc(rowObj[field]||"")}">
        <div class="ac-list"></div>
      </div>`;
  }
  const input = host.querySelector(multiline ? "textarea" : "input");
  const list = host.querySelector(".ac-list");

  function autoGrow(){
    if(!multiline) return;
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  }
  if(multiline) requestAnimationFrame(autoGrow);

  function source(){ return store.history[cat] || []; }

  function open(filter){
    const q = (filter||"").trim();
    const items = source().filter(v=> !q || v.includes(q)).slice(0,30);
    if(items.length===0){ list.classList.remove("open"); list.innerHTML=""; return; }
    list.innerHTML = items.map(v=>`
      <div class="ac-item" data-v="${esc(v)}">
        <span>${esc(v)}</span>
        <span class="x" data-rm="${esc(v)}">削除</span>
      </div>`).join("");
    list.classList.add("open");
  }

  input.addEventListener("focus", ()=> open(input.value));
  input.addEventListener("input", ()=>{ rowObj[field]=input.value; autoGrow(); open(input.value); });
  input.addEventListener("blur", ()=> setTimeout(()=>list.classList.remove("open"), 180));

  list.addEventListener("mousedown", e=>{
    const rm = e.target.closest("[data-rm]");
    if(rm){
      e.preventDefault();
      const v = rm.getAttribute("data-rm");
      const arr = store.history[cat];
      const i = arr.indexOf(v); if(i>-1) arr.splice(i,1);
      saveStore(); open(input.value);
      return;
    }
    const it = e.target.closest(".ac-item");
    if(it){
      e.preventDefault();
      const v = it.getAttribute("data-v");
      input.value=v; rowObj[field]=v; list.classList.remove("open"); autoGrow(); updateSummary();
    }
  });
}

/* ============================================================
   人工数チェック（同一日・社員/日雇区別・同名合計＝7h）
   ============================================================ */
const summaryEl = document.getElementById("summary");
const sumBody = document.getElementById("sumBody");

function calcTotals(){
  const map = {}; // key = kind|name
  rows.forEach(r=>{
    const name = (r.name||"").trim();
    if(!name) return;
    const key = r.kind+"|"+name;
    if(!map[key]) map[key]={kind:r.kind,name,ninku:0,ot:0};
    map[key].ninku += Number(r.ninku)||0;
    map[key].ot += Number(r.ot)||0;
  });
  return Object.values(map);
}

// 7の倍数（7,14,21…）になっているか。0は対象外（未入力）
function isOkNinku(v){
  if(!(v>0)) return false;
  const q = v/7;
  return Math.abs(q - Math.round(q)) < 1e-9;
}

function updateSummary(){
  const totals = calcTotals();
  if(totals.length===0){ summaryEl.style.display="none"; return; }
  summaryEl.style.display="block";
  sumBody.innerHTML = totals.map(t=>{
    const ok = isOkNinku(t.ninku);
    return `<div class="sum-row ${ok?'ok':'ng'}">
      <div><span class="who">${esc(t.name)}</span><span class="tag">${t.kind==='staff'?'社員':'外注'}</span>${t.ot>0?`<span class="ot">残業 ${t.ot}h</span>`:""}</div>
      <div class="val">${t.ninku}h ${ok?'✓':'／ 7の倍数でない'}</div>
    </div>`;
  }).join("");
}

/* ============================================================
   送信（動作確認：localStorageに履歴を蓄積するのみ）
   ============================================================ */
const sendBtn = document.getElementById("sendBtn");
sendBtn.addEventListener("click", ()=>{
  const date = document.getElementById("workDate").value;
  if(!date){ toast("作業日を入力してください"); return; }
  if(!(store.operator||"").trim()){
    toast("設定画面で入力者名を登録してください");
    renderSettings(); openModal("settingsModal");
    return;
  }
  if(rows.length===0){ toast("入力された行がありません"); return; }

  // 必須項目チェック（コメント・残業以外はすべて必須）
  const errs = [];
  rows.forEach((r, i)=>{
    const miss = [];
    if(!(r.name||"").trim())   miss.push("職人名");
    if(!(r.client||"").trim()) miss.push("取引先名");
    if(!(r.site||"").trim())   miss.push("現場名");
    if(!(r.w1||"").trim())     miss.push("作業内容①");
    if(!(r.w2||"").trim())     miss.push("作業内容②");
    if(!(r.w3||"").trim())     miss.push("作業内容③");
    if(!(Number(r.ninku)>0))   miss.push("人工数");
    if(miss.length) errs.push(`No.${i+1}：${miss.join("・")}`);
  });
  if(errs.length){
    document.getElementById("confirmBody").innerHTML = `
      <div class="warn-box">
        次の項目が未入力のため送信できません。入力してください。
        <ul>${errs.map(e=>`<li>${esc(e)}</li>`).join("")}</ul>
      </div>`;
    // 確認モーダルを「送信不可（閉じるだけ）」表示にする
    document.getElementById("confirmModal").classList.add("error-only");
    openModal("confirmModal");
    return;
  }
  document.getElementById("confirmModal").classList.remove("error-only");

  // 7の倍数チェック（同一日・社員/外注区別・同名合計）
  const totals = calcTotals();
  const ng = totals.filter(t=> !isOkNinku(t.ninku));
  if(ng.length>0){
    document.getElementById("confirmBody").innerHTML = `
      <div class="warn-box">
        次の方の人工数合計が <b>7の倍数（7・14・21…）</b> になっていません。入力に間違いがないか確認してください。
        <ul>${ng.map(t=>`<li>${esc(t.name)}（${t.kind==='staff'?'社員':'外注'}）：合計 <b>${t.ninku}h</b></li>`).join("")}</ul>
      </div>
      <div style="font-size:13px;color:var(--sub)">問題なければそのまま送信できます。</div>`;
    openModal("confirmModal");
  }else{
    doSend();
  }
});

document.getElementById("confirmSend").addEventListener("click", ()=>{ closeModals(); doSend(); });

function doSend(){
  // 履歴に蓄積
  rows.forEach(r=>{
    if(!(r.name||"").trim()) return;
    if(r.kind==="casual") pushHistory("casual", r.name);
    pushHistory("client", r.client);
    pushHistory("site", r.site);
    pushHistory("work1", r.w1);
    pushHistory("work2", r.w2);
    pushHistory("work3", r.w3);
  });
  saveStore();
  /* ▼▼▼ 後段でここを GAS の fetch 送信に差し替え ▼▼▼
     const payload = {
       operator: store.operator,   // 入力者（この端末の使用者）
       date,
       rows: rows.map(...)         // 各行に 作業した職人名・人工・残業など
     };
     fetch(GAS_URL, {method:"POST", body:JSON.stringify(payload)});
     ▲▲▲ */
  toast("送信しました（確認用：端末に保存）");
  // リセット（日付は維持）
  rows = [newRow()];
  renderRows();
}

/* ============================================================
   和暦＋曜日ラベル
   ============================================================ */
const WEEK_EN = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// 春分・秋分日（近似式）
function shunbun(y){ return Math.floor(20.8431 + 0.242194*(y-1980) - Math.floor((y-1980)/4)); }
function shubun(y){ return Math.floor(23.2488 + 0.242194*(y-1980) - Math.floor((y-1980)/4)); }
// 指定月の第n月曜日
function nthMonday(y,m,n){ const first=new Date(y,m-1,1).getDay(); const day=1+((8-first)%7)+(n-1)*7; return day; }

// 日本の祝日判定（主要祝日・振替休日に対応）
function isJpHoliday(d){
  const y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate(), w=d.getDay();
  const hol = (mm,dd)=> (m===mm && day===dd);
  let isHol = false;
  if(hol(1,1)) isHol=true;                          // 元日
  if(m===1 && day===nthMonday(y,1,2)) isHol=true;    // 成人の日
  if(hol(2,11)) isHol=true;                          // 建国記念の日
  if(hol(2,23) && y>=2020) isHol=true;               // 天皇誕生日
  if(m===3 && day===shunbun(y)) isHol=true;          // 春分の日
  if(hol(4,29)) isHol=true;                          // 昭和の日
  if(hol(5,3)) isHol=true;                           // 憲法記念日
  if(hol(5,4)) isHol=true;                           // みどりの日
  if(hol(5,5)) isHol=true;                           // こどもの日
  if(m===7 && day===nthMonday(y,7,3)) isHol=true;    // 海の日
  if(hol(8,11)) isHol=true;                          // 山の日
  if(m===9 && day===nthMonday(y,9,3)) isHol=true;    // 敬老の日
  if(m===9 && day===shubun(y)) isHol=true;           // 秋分の日
  if(m===10 && day===nthMonday(y,10,2)) isHol=true;  // スポーツの日
  if(hol(11,3)) isHol=true;                          // 文化の日
  if(hol(11,23)) isHol=true;                         // 勤労感謝の日
  // 振替休日：前日が日曜の祝日なら月曜を休日に（簡易対応）
  if(!isHol && w===1){
    const prev=new Date(d); prev.setDate(day-1);
    if(prev.getDay()===0 && isJpHolidayRaw(prev)) isHol=true;
  }
  return isHol;
}
// 振替判定用（振替を含めない素の祝日チェック）
function isJpHolidayRaw(d){
  const y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
  const hol=(mm,dd)=>(m===mm&&day===dd);
  if(hol(1,1)||hol(2,11)||(hol(2,23)&&y>=2020)||hol(4,29)||hol(5,3)||hol(5,4)||hol(5,5)||hol(8,11)||hol(11,3)||hol(11,23)) return true;
  if(m===1 && day===nthMonday(y,1,2)) return true;
  if(m===3 && day===shunbun(y)) return true;
  if(m===7 && day===nthMonday(y,7,3)) return true;
  if(m===9 && (day===nthMonday(y,9,3)||day===shubun(y))) return true;
  if(m===10 && day===nthMonday(y,10,2)) return true;
  return false;
}

function updateWarekiLabel(){
  const el = document.getElementById("dateWareki");
  const v = document.getElementById("workDate").value;
  if(!v){ el.textContent=""; el.classList.remove("holiday"); return; }
  const d = new Date(v + "T00:00:00");
  if(isNaN(d)){ el.textContent=""; el.classList.remove("holiday"); return; }
  el.textContent = WEEK_EN[d.getDay()];
  const red = (d.getDay()===0) || isJpHoliday(d);   // 日曜 or 祝日
  el.classList.toggle("holiday", red);
}

/* ============================================================
   初期化
   ============================================================ */
(function init(){
  document.getElementById("addRow").addEventListener("click", addRow);
  document.getElementById("addWorkRow").addEventListener("click", addWorkRow);
  const wd = document.getElementById("workDate");
  wd.addEventListener("change", updateWarekiLabel);
  const d = new Date();
  const iso = new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
  wd.value = iso;
  updateWarekiLabel();
  rows = [newRow()];
  renderRows();
})();
</script>
